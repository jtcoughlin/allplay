<!DOCTYPE html>
<html>
<head>
    <title>Image Debug Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .log { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .error { background: #ffe6e6; border-left: 4px solid #ff0000; }
        .success { background: #e6ffe6; border-left: 4px solid #00ff00; }
        .debug { background: #e6f3ff; border-left: 4px solid #0066cc; }
        img { border: 2px solid #ccc; margin: 10px; }
    </style>
</head>
<body>
    <h1>Image Loading Test</h1>
    <div id="logs"></div>
    
    <h2>Test Images:</h2>
    <div id="images"></div>

    <script>
        const logs = document.getElementById('logs');
        const images = document.getElementById('images');
        
        function addLog(message, type = 'debug') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = new Date().toLocaleTimeString() + ': ' + message;
            logs.appendChild(div);
            console.log(message);
        }
        
        // Override console methods to show on page
        const originalLog = console.log;
        const originalError = console.error;
        
        console.log = function(...args) {
            addLog(args.join(' '), 'debug');
            originalLog.apply(console, args);
        };
        
        console.error = function(...args) {
            addLog(args.join(' '), 'error');
            originalError.apply(console, args);
        };
        
        // Fetch content and test images
        fetch('/api/content')
            .then(response => response.json())
            .then(data => {
                addLog(`Fetched ${data.length} content items`);
                
                // Test first 5 images
                data.slice(0, 5).forEach((item, index) => {
                    addLog(`Testing ${item.title} - URL: ${item.imageUrl?.substring(0, 100)}...`);
                    
                    const img = document.createElement('img');
                    img.src = item.imageUrl;
                    img.alt = item.title;
                    img.style.width = '200px';
                    img.style.height = '300px';
                    
                    img.onload = () => {
                        addLog(`✅ IMAGE LOADED: ${item.title}`, 'success');
                    };
                    
                    img.onerror = (e) => {
                        addLog(`❌ IMAGE FAILED: ${item.title} - ${item.imageUrl}`, 'error');
                    };
                    
                    const div = document.createElement('div');
                    div.style.display = 'inline-block';
                    div.appendChild(img);
                    
                    const label = document.createElement('p');
                    label.textContent = item.title;
                    label.style.textAlign = 'center';
                    div.appendChild(label);
                    
                    images.appendChild(div);
                });
            })
            .catch(error => {
                addLog(`Error fetching content: ${error}`, 'error');
            });
    </script>
</body>
</html>
