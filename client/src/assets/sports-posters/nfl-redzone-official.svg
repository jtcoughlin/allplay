<svg viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="redZoneOfficialGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Red Zone Background -->
  <rect width="300" height="450" fill="url(#redZoneOfficialGradient)"/>
  
  <!-- NFL Shield -->
  <g transform="translate(150, 120)">
    <path d="M0,-40 L30,-20 L30,20 L0,40 L-30,20 L-30,-20 Z" fill="white" stroke="#003366" stroke-width="2"/>
    <rect x="-20" y="-15" width="40" height="8" fill="#003366"/>
    <rect x="-20" y="-5" width="40" height="8" fill="#FF0000"/>
    <rect x="-20" y="5" width="40" height="8" fill="white"/>
    <text x="0" y="25" text-anchor="middle" fill="#003366" font-family="Arial, sans-serif" font-size="8" font-weight="bold">NFL</text>
  </g>
  
  <!-- RedZone Logo -->
  <text x="150" y="220" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="48" font-weight="bold">NFL</text>
  <rect x="80" y="235" width="140" height="50" fill="white" rx="5"/>
  <text x="150" y="270" text-anchor="middle" fill="#FF0000" font-family="Arial, sans-serif" font-size="32" font-weight="bold">REDZONE</text>
  
  <!-- Scott Hanson -->
  <text x="150" y="340" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16">WITH SCOTT HANSON</text>
  
  <!-- 7 Hours Banner -->
  <rect x="40" y="370" width="220" height="35" fill="rgba(0,0,0,0.8)" rx="5"/>
  <text x="150" y="393" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">7 HOURS OF REDZONE FOOTBALL</text>
  
  <!-- Network -->
  <text x="150" y="425" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">EXCLUSIVELY ON DIRECTV & DISH</text>
</svg>