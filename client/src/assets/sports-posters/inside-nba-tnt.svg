<svg viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="insideNBAGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333333;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Black TNT Background -->
  <rect width="300" height="450" fill="url(#insideNBAGradient)"/>
  
  <!-- Basketball Court -->
  <ellipse cx="150" cy="180" rx="120" ry="60" fill="#8B4513" stroke="white" stroke-width="3"/>
  <circle cx="150" cy="180" r="30" fill="none" stroke="white" stroke-width="2"/>
  <line x1="30" y1="180" x2="270" y2="180" stroke="white" stroke-width="2"/>
  
  <!-- Basketball -->
  <circle cx="150" cy="180" r="25" fill="#FF7A00" stroke="#000" stroke-width="2"/>
  <path d="M125,180 Q150,155 175,180" stroke="#000" stroke-width="2" fill="none"/>
  <path d="M125,180 Q150,205 175,180" stroke="#000" stroke-width="2" fill="none"/>
  <line x1="150" y1="155" x2="150" y2="205" stroke="#000" stroke-width="2"/>
  
  <!-- INSIDE THE NBA Logo -->
  <text x="150" y="100" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">INSIDE</text>
  <text x="150" y="130" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20">THE</text>
  <text x="150" y="280" text-anchor="middle" fill="#C41E3A" font-family="Arial, sans-serif" font-size="36" font-weight="bold">NBA</text>
  
  <!-- TNT Logo -->
  <rect x="110" y="320" width="80" height="30" fill="white" rx="3"/>
  <text x="150" y="340" text-anchor="middle" fill="black" font-family="Arial, sans-serif" font-size="20" font-weight="bold">TNT</text>
  
  <!-- Host Names -->
  <text x="150" y="375" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">ERNIE • CHARLES • SHAQ • KENNY</text>
  
  <!-- Emmy Award -->
  <rect x="70" y="395" width="160" height="25" fill="rgba(255,215,0,0.8)" rx="3"/>
  <text x="150" y="412" text-anchor="middle" fill="black" font-family="Arial, sans-serif" font-size="10" font-weight="bold">EMMY AWARD WINNING</text>
  
  <!-- Thursdays -->
  <text x="150" y="435" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">THURSDAY NIGHTS</text>
</svg>