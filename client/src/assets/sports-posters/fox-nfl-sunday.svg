<svg viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="foxNFLGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003f7f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- FOX Blue Background -->
  <rect width="300" height="450" fill="url(#foxNFLGradient)"/>
  
  <!-- Cleatus the Robot Silhouette -->
  <g transform="translate(150, 140)">
    <circle cx="0" cy="-20" r="15" fill="silver" stroke="white" stroke-width="2"/>
    <rect x="-10" y="-5" width="20" height="30" fill="silver" stroke="white" stroke-width="2" rx="3"/>
    <rect x="-15" y="25" width="8" height="20" fill="silver" stroke="white" stroke-width="2" rx="2"/>
    <rect x="7" y="25" width="8" height="20" fill="silver" stroke="white" stroke-width="2" rx="2"/>
    <rect x="-20" y="5" width="10" height="15" fill="silver" stroke="white" stroke-width="2" rx="2"/>
    <rect x="10" y="5" width="10" height="15" fill="silver" stroke="white" stroke-width="2" rx="2"/>
    <!-- Eyes -->
    <circle cx="-5" cy="-25" r="2" fill="#00FFFF"/>
    <circle cx="5" cy="-25" r="2" fill="#00FFFF"/>
  </g>
  
  <!-- NFL on FOX Logo -->
  <text x="150" y="250" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="32" font-weight="bold">NFL</text>
  <text x="150" y="280" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18">ON</text>
  
  <!-- FOX Logo -->
  <rect x="100" y="295" width="100" height="40" fill="white" rx="5"/>
  <text x="150" y="320" text-anchor="middle" fill="#003f7f" font-family="Arial, sans-serif" font-size="28" font-weight="bold">FOX</text>
  
  <!-- America's Game -->
  <rect x="50" y="355" width="200" height="25" fill="rgba(255,255,255,0.9)" rx="3"/>
  <text x="150" y="372" text-anchor="middle" fill="#003f7f" font-family="Arial, sans-serif" font-size="12" font-weight="bold">AMERICA'S GAME OF THE WEEK</text>
  
  <!-- Sunday -->
  <text x="150" y="400" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">SUNDAYS</text>
  
  <!-- Broadcast Team -->
  <text x="150" y="425" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">KEVIN BURKHARDT • TOM BRADY</text>
</svg>