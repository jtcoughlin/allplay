<svg viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nbaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c60c30;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d428a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="300" height="450" fill="url(#nbaGradient)"/>
  
  <!-- Basketball -->
  <circle cx="150" cy="160" r="60" fill="#ff7a00" stroke="#000" stroke-width="2"/>
  <path d="M90,160 Q150,120 210,160" stroke="#000" stroke-width="2" fill="none"/>
  <path d="M90,160 Q150,200 210,160" stroke="#000" stroke-width="2" fill="none"/>
  <line x1="150" y1="100" x2="150" y2="220" stroke="#000" stroke-width="2"/>
  
  <!-- NBA Logo -->
  <text x="150" y="280" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="48" font-weight="bold">NBA</text>
  <text x="150" y="320" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24">ON</text>
  <text x="150" y="360" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="42" font-weight="bold">TNT</text>
  
  <!-- Bottom accent -->
  <rect x="0" y="400" width="300" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="150" y="430" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14">LIVE GAMES & HIGHLIGHTS</text>
</svg>