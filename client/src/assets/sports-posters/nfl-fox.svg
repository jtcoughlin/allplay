<svg viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="foxNflGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e5799;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="300" height="450" fill="url(#foxNflGradient)"/>
  
  <!-- Football Field -->
  <rect x="30" y="120" width="240" height="160" fill="#228b22" stroke="white" stroke-width="3"/>
  <line x1="30" y1="200" x2="270" y2="200" stroke="white" stroke-width="4"/>
  <text x="150" y="210" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">50</text>
  
  <!-- Goal Posts -->
  <rect x="140" y="110" width="4" height="20" fill="yellow"/>
  <rect x="156" y="110" width="4" height="20" fill="yellow"/>
  <rect x="130" y="110" width="40" height="4" fill="yellow"/>
  
  <rect x="140" y="280" width="4" height="20" fill="yellow"/>
  <rect x="156" y="280" width="4" height="20" fill="yellow"/>
  <rect x="130" y="296" width="40" height="4" fill="yellow"/>
  
  <!-- NFL Shield -->
  <polygon points="150,150 130,170 130,190 150,210 170,190 170,170" fill="white" stroke="#003366" stroke-width="2"/>
  <text x="150" y="185" text-anchor="middle" fill="#003366" font-family="Arial, sans-serif" font-size="12" font-weight="bold">NFL</text>
  
  <!-- Text -->
  <text x="150" y="340" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="36" font-weight="bold">NFL</text>
  <text x="150" y="370" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20">ON</text>
  
  <!-- FOX Logo -->
  <rect x="100" y="380" width="100" height="35" fill="white" rx="5"/>
  <text x="150" y="403" text-anchor="middle" fill="#003366" font-family="Arial, sans-serif" font-size="26" font-weight="bold">FOX</text>
  
  <rect x="20" y="420" width="260" height="25" fill="rgba(0,0,0,0.8)"/>
  <text x="150" y="437" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">AMERICA'S GAME OF THE WEEK</text>
</svg>