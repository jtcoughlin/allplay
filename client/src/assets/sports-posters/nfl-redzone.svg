<svg viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="redZoneGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c41e3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b1538;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="300" height="450" fill="url(#redZoneGradient)"/>
  
  <!-- Football Field Lines -->
  <rect x="20" y="100" width="260" height="200" fill="#228b22" stroke="white" stroke-width="2"/>
  <line x1="20" y1="150" x2="280" y2="150" stroke="white" stroke-width="1"/>
  <line x1="20" y1="200" x2="280" y2="200" stroke="white" stroke-width="3"/>
  <line x1="20" y1="250" x2="280" y2="250" stroke="white" stroke-width="1"/>
  
  <!-- Football -->
  <ellipse cx="150" cy="200" rx="25" ry="40" fill="#8b4513" stroke="#000" stroke-width="2"/>
  <line x1="150" y1="170" x2="150" y2="230" stroke="white" stroke-width="2"/>
  <line x1="130" y1="185" x2="170" y2="185" stroke="white" stroke-width="1"/>
  <line x1="130" y1="200" x2="170" y2="200" stroke="white" stroke-width="1"/>
  <line x1="130" y1="215" x2="170" y2="215" stroke="white" stroke-width="1"/>
  
  <!-- NFL RedZone Logo -->
  <text x="150" y="350" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="36" font-weight="bold">NFL</text>
  <text x="150" y="390" text-anchor="middle" fill="#c41e3a" font-family="Arial, sans-serif" font-size="32" font-weight="bold" stroke="white" stroke-width="1">REDZONE</text>
  
  <!-- Commercial Free Banner -->
  <rect x="20" y="410" width="260" height="30" fill="rgba(0,0,0,0.8)"/>
  <text x="150" y="430" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">7 HOURS OF FOOTBALL</text>
</svg>