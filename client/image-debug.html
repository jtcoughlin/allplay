<!DOCTYPE html>
<html>
<head>
    <title>Image Debug Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #000; color: #fff; }
        .log { background: #333; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .error { background: #4a0000; border-left: 4px solid #ff0000; }
        .success { background: #004a00; border-left: 4px solid #00ff00; }
        .debug { background: #003366; border-left: 4px solid #0066cc; }
        img { border: 2px solid #666; margin: 10px; background: #222; }
        .image-container { display: inline-block; margin: 10px; text-align: center; }
    </style>
</head>
<body>
    <h1>Allplay Image Loading Test</h1>
    <div id="logs"></div>
    
    <h2>Test Images:</h2>
    <div id="images"></div>

    <script>
        const logs = document.getElementById('logs');
        const images = document.getElementById('images');
        
        function addLog(message, type = 'debug') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = new Date().toLocaleTimeString() + ': ' + message;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
        }
        
        addLog('Starting image test...');
        
        // Fetch content and test images
        fetch('/api/content')
            .then(response => {
                addLog('Content API response received');
                return response.json();
            })
            .then(data => {
                addLog(`Fetched ${data.length} content items`, 'success');
                
                // Test first 6 images
                data.slice(0, 6).forEach((item, index) => {
                    const urlPreview = item.imageUrl ? item.imageUrl.substring(0, 80) + '...' : 'NO URL';
                    addLog(`${index + 1}. ${item.title} (${item.service})`);
                    addLog(`   URL: ${urlPreview}`);
                    
                    const container = document.createElement('div');
                    container.className = 'image-container';
                    
                    const img = document.createElement('img');
                    img.src = item.imageUrl || '';
                    img.alt = item.title;
                    img.style.width = '160px';
                    img.style.height = '240px';
                    img.style.objectFit = 'cover';
                    
                    img.onload = () => {
                        addLog(`✅ LOADED: ${item.title}`, 'success');
                    };
                    
                    img.onerror = (e) => {
                        addLog(`❌ FAILED: ${item.title}`, 'error');
                        addLog(`   Error: ${e.type || 'unknown error'}`, 'error');
                    };
                    
                    container.appendChild(img);
                    
                    const label = document.createElement('p');
                    label.textContent = `${item.title} (${item.service})`;
                    label.style.fontSize = '12px';
                    label.style.maxWidth = '160px';
                    label.style.margin = '5px 0';
                    container.appendChild(label);
                    
                    images.appendChild(container);
                });
            })
            .catch(error => {
                addLog(`ERROR: Failed to fetch content - ${error.message}`, 'error');
            });
    </script>
</body>
</html>
